server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Company / account settings APIs — must precede the SPA /settings/* routes.
    location = /settings/company {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /settings/account-overview {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy backend API routes (preserve path — do not strip prefixes).
    # Includes platform/RBAC paths used when VITE_API_BASE_URL is empty (same-origin).
    location ~ ^/(auth|admin|alerts|accounts|analytics|hr|inventory|maintenance|procurement|quality|sales|documents|ai|api|dispatch|supply-chain|forecasting|integrations|iot|factory-monitor|tasks|production-scheduling|warehouse|audit-logs|platform|sidebar|roles|permissions|users|profile|notifications|health)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
